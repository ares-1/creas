                                                    )}
                                                </li>
                                            );
                                        })}
                                    </ul>
                                </div>
                            </section>
                        </div>
                        <div className="space-y-6">
                            <section className="bg-blue-950 rounded-xl p-6 border border-blue-900 shadow-sm">
                                <h3 className="text-lg font-bold text-white mb-4 flex items-center gap-2"><MapIcon className="w-5 h-5 text-amber-400"/> Acompañando la Vida</h3>
                                <ul className="space-y-3">
                                    {gradeData.visitas.map((v, i) => (
                                        <li key={i} className="flex gap-2 text-sm text-blue-100 leading-tight">
                                            <ChevronRight className="w-4 h-4 mt-0.5 text-amber-400 flex-shrink-0"/> <span>{v}</span>
                                        </li>
                                    ))}
                                </ul>
                            </section>
                            <section className="bg-amber-50 rounded-xl p-6 border border-amber-200 shadow-sm">
                                <h3 className="text-lg font-bold text-amber-950 mb-4 flex items-center gap-2"><Lightbulb className="w-5 h-5 text-amber-600"/> Proyectos (Defensores)</h3>
                                <ul className="space-y-3">
                                    {gradeData.proyectos.map((p, i) => (
                                        <li key={i} className="flex gap-2 text-sm text-amber-900 leading-tight">
                                            <CheckCircle className="w-4 h-4 mt-0.5 text-amber-500 flex-shrink-0"/> <span>{p}</span>
                                        </li>
                                    ))}
                                </ul>
                            </section>
                        </div>
                    </div>
                </div>
            );
        };

        function App() {
            return (
                <div className="min-h-screen flex flex-col">
                    <Navigation />
                    <main className="flex-grow"><ViewGrade /></main>
                    <footer className="bg-blue-950 text-blue-200 py-8 text-center text-sm border-t-4 border-amber-500 mt-12">
                        <div className="max-w-7xl mx-auto px-4 flex flex-col md:flex-row justify-between items-center gap-4">
                            <p className="font-semibold">© 2026 Programa CREAS - High School.</p>
                            <p className="flex items-center gap-2"><Heart className="w-4 h-4 text-amber-400"/> Dilexit nos y Dilexi te</p>
                        </div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
