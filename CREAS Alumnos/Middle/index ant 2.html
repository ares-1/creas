            {
                short: "1. Dignidad Trascendente de la Persona", title: "Dignidad Trascendente de la Persona",

                quotes: [
                    { source: "Gaudium et Spes, 12", text: "Creyentes y no creyentes están generalmente de acuerdo en este punto: todos los bienes de la tierra deben ordenarse en función del hombre, centro y cima de todos ellos." },
                    { source: "Catecismo de la Iglesia Católica, 1700", text: "La dignidad de la persona humana está enraizada en su creación a imagen y semejanza de Dios; se realiza en su vocación a la bienaventuranza divina." },

                    { source: "Populorum Progressio, 22", text: "La propiedad privada no constituye para nadie un derecho incondicional y absoluto. Nadie está autorizado a reservar para su uso exclusivo lo que supera a su necesidad, cuando a los demás les falta lo necesario." },
                    { source: "Catecismo de la Iglesia Católica, 2402", text: "Al comienzo, Dios confió la tierra y sus recursos a la administración común de la humanidad para que tuviera cuidado de ellos y los dominara mediante el trabajo." },

                ]
            },
            {
                short: "5. Subsidiaridad", title: "Subsidiaridad",

                quotes: [
                    { source: "Fratelli Tutti, 215", text: "La vida es el arte del encuentro, aunque haya tanto desencuentro en la vida. Nos apasiona el encontrarnos, el buscar puntos de contacto, el tender puentes, el planear algo que incluya a todos." },

                    { source: "Catecismo de la Iglesia Católica, 1931", text: "El respeto a la persona humana pasa por el respeto del principio: 'Que cada uno, sin ninguna excepción, debe considerar al prójimo como otro yo, cuidando en primer lugar de su vida y de los medios necesarios para vivirla dignamente'." }
                ]
            },
            {
                short: "7. Ecología Integral", title: "Ecología Integral",

                quotes: [
                    { source: "Laudato Si', 139", text: "No hay dos crisis separadas, una ambiental y otra social, sino una sola y compleja crisis socio-ambiental. Las líneas para la solución requieren una aproximación integral para combatir la pobreza." },

                    { source: "Laudato Si', 49", text: "Hoy no podemos dejar de reconocer que un verdadero planteo ecológico se convierte siempre en un planteo social, que debe integrar la justicia en las discusiones sobre el ambiente, para escuchar tanto el clamor de la tierra como el clamor de los pobres." }
                ]
            },
            {
                short: "8. Dignidad del Trabajo", title: "Dignidad del Trabajo",
                desc: "El trabajo es un bien del hombre que expresa y acrecienta la dignidad humana. Todo trabajo honrado, ya sea intelectual o manual, es participación activa en la obra creadora de Dios.",

                    { source: "Laudato Si', 128", text: "El trabajo es una necesidad, parte del sentido de la vida en esta tierra, camino de maduración, de desarrollo humano y de realización personal." }
                ]
            },
            {
                short: "9. Participación Ciudadana", title: "Participación Ciudadana",
                desc: "El deber cívico y moral de todos los ciudadanos de contribuir activamente a la vida cultural, económica, política y social de la comunidad para promover la paz y la legalidad.",

                    { source: "Catecismo de la Iglesia Católica, 1913", text: "La participación es el compromiso voluntario y generoso de la persona en los intercambios sociales. Es necesario que todos participen, cada uno según el lugar que ocupa." },
                    { source: "Compendio de la DSI, 189", text: "La participación en la vida comunitaria no es solamente una de las mayores aspiraciones del ciudadano, llamado a ejercitar libremente el propio papel, sino también uno de los pilares de todo ordenamiento democrático." },
                    { source: "Fratelli Tutti, 180", text: "La política es más noble que la apariencia, el marketing, y distintas formas de maquillaje mediático... Necesitamos una política que piense con visión amplia." },

                ]
