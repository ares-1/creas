<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Programa CREAS Institucional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        .animate-fadeIn { animation: fadeIn 0.8s ease-out forwards; }
        .animate-slideUp { animation: slideUp 0.8s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        html { scroll-behavior: smooth; }
        body { overflow-x: hidden; }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-800 antialiased selection:bg-indigo-200 selection:text-indigo-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- ÍCONOS SVG GARANTIZADOS ---
        const Icon = ({ paths, className }) => (<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>{paths}</svg>);
        const Heart = ({className}) => <Icon className={className} paths={<path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>} />;
        const Shield = ({className}) => <Icon className={className} paths={<><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></>} />;
        const Compass = ({className}) => <Icon className={className} paths={<><circle cx="12" cy="12" r="10"/><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/></>} />;
        const Layers = ({className}) => <Icon className={className} paths={<><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></>} />;
        const ArrowRight = ({className}) => <Icon className={className} paths={<><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></>} />;
        const Flame = ({className}) => <Icon className={className} paths={<><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/></>} />;
        const Globe = ({className}) => <Icon className={className} paths={<><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></>} />;
        const Activity = ({className}) => <Icon className={className} paths={<polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>} />;
        const CheckCircle = ({className}) => <Icon className={className} paths={<><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></>} />;
        const BookOpen = ({className}) => <Icon className={className} paths={<><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></>} />;
        const Users = ({className}) => <Icon className={className} paths={<><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><polyline points="17 11 19 13 23 9"/></>} />;
        const Smile = ({className}) => <Icon className={className} paths={<><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></>} />;
        const MenuIcon = ({className}) => <Icon className={className} paths={<><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></>} />;
        const X = ({className}) => <Icon className={className} paths={<><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></>} />;
        const Target = ({className}) => <Icon className={className} paths={<><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></>} />;
        const FileText = ({className}) => <Icon className={className} paths={<><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></>} />;
        const MapIcon = ({className}) => <Icon className={className} paths={<><polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21"/><line x1="9" y1="3" x2="9" y2="18"/><line x1="15" y1="6" x2="15" y2="21"/></>} />;
        const Lightbulb = ({className}) => <Icon className={className} paths={<><path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A6 6 0 0 0 6 8c0 1.3.5 2.6 1.5 3.5.8.8 1.3 1.5 1.5 2.5"/><path d="M9 18h6"/><path d="M10 22h4"/></>} />;
        const Download = ({className}) => <Icon className={className} paths={<><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></>} />;
        const ExternalLink = ({className}) => <Icon className={className} paths={<><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></>} />;

        // --- COMPONENTES PRINCIPALES ---

        const Navbar = () => {
            const [scrolled, setScrolled] = useState(false);
            const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);

            useEffect(() => {
                const handleScroll = () => setScrolled(window.scrollY > 50);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            return (
                <nav className={`fixed w-full z-50 transition-all duration-300 ${scrolled || isMobileMenuOpen ? 'bg-white/95 backdrop-blur-md shadow-md py-3' : 'bg-transparent py-5'}`}>
                    <div className="max-w-7xl mx-auto px-6 md:px-12 flex justify-between items-center">
                        {/* LOGO CON ENLACE A INDEX.HTML */}
                        <a href="index.html" className="flex items-center gap-3 group cursor-pointer transition-opacity hover:opacity-80">
                            <Shield className={`w-8 h-8 flex-shrink-0 transition-colors ${scrolled || isMobileMenuOpen ? 'text-indigo-700' : 'text-indigo-400'}`} />
                            <span className={`font-black text-xl tracking-tight transition-colors ${scrolled || isMobileMenuOpen ? 'text-slate-900' : 'text-white'}`}>CREAS</span>
                        </a>

                        {/* Menú Escritorio */}
                        <div className="hidden md:flex gap-8 items-center">
                            <a href="#fundamentos" className={`text-sm font-bold transition-colors ${scrolled ? 'text-slate-600 hover:text-indigo-600' : 'text-indigo-100 hover:text-white'}`}>Fundamentos</a>
                            <a href="#metodologia" className={`text-sm font-bold transition-colors ${scrolled ? 'text-slate-600 hover:text-indigo-600' : 'text-indigo-100 hover:text-white'}`}>Metodología</a>
                            <a href="#materiales" className={`text-sm font-bold transition-colors ${scrolled ? 'text-slate-600 hover:text-indigo-600' : 'text-indigo-100 hover:text-white'}`}>Materiales</a>
                            <a href="#etapas" className="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2.5 rounded-full text-sm font-bold transition-all shadow-lg shadow-indigo-500/30 hover:scale-105">Ingresar al Portal</a>
                        </div>
                        {/* Botón Menú Móvil */}
                        <div className="md:hidden flex items-center">
                            <button onClick={() => setIsMobileMenuOpen(!isMobileMenuOpen)} className={`p-2 rounded-lg cursor-pointer transition-colors flex-shrink-0 ${scrolled || isMobileMenuOpen ? 'text-slate-900 hover:text-indigo-600 hover:bg-indigo-50' : 'text-white hover:text-indigo-200 hover:bg-white/10'}`}>
                                {isMobileMenuOpen ? <X className="w-7 h-7 flex-shrink-0" /> : <MenuIcon className="w-7 h-7 flex-shrink-0" />}
                            </button>
                        </div>
                    </div>
                    {/* Desplegable Menú Móvil */}
                    {isMobileMenuOpen && (
                        <div className="md:hidden bg-white border-t border-slate-100 absolute top-full left-0 w-full shadow-2xl py-6 px-6 flex flex-col gap-5 animate-fadeIn">
                            <a href="#fundamentos" onClick={() => setIsMobileMenuOpen(false)} className="text-lg font-bold text-slate-700 hover:text-indigo-600 border-b border-slate-100 pb-3">Fundamentos</a>
                            <a href="#metodologia" onClick={() => setIsMobileMenuOpen(false)} className="text-lg font-bold text-slate-700 hover:text-indigo-600 border-b border-slate-100 pb-3">Metodología</a>
                            <a href="#materiales" onClick={() => setIsMobileMenuOpen(false)} className="text-lg font-bold text-slate-700 hover:text-indigo-600 border-b border-slate-100 pb-3">Materiales</a>
                            <a href="#etapas" onClick={() => setIsMobileMenuOpen(false)} className="mt-2 bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-4 rounded-xl text-center font-bold shadow-md transition-colors">Ingresar al Portal</a>
                        </div>
                    )}
                </nav>
            );
        };

        const Hero = () => (
            <div className="relative bg-slate-900 pt-32 pb-20 lg:pt-48 lg:pb-32 overflow-hidden">
                {/* Background Decorators */}
                <div className="absolute top-0 left-0 w-full h-full overflow-hidden z-0 pointer-events-none">
                    <div className="absolute -top-[30%] -right-[10%] w-[70%] h-[70%] rounded-full bg-gradient-to-br from-indigo-600/30 to-purple-800/10 blur-3xl"></div>
                    <div className="absolute top-[60%] -left-[10%] w-[50%] h-[50%] rounded-full bg-gradient-to-tr from-blue-600/20 to-emerald-500/10 blur-3xl"></div>
                    <div className="absolute inset-0 bg-[url('data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMjAiIGhlaWdodD0iMjAiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+PGNpcmNsZSBjeD0iMiIgY3k9IjIiIHI9IjEiIGZpbGw9InJnYmEoMjU1LDI1NSwyNTUsMC4wNSkiLz48L3N2Zz4=')] opacity-50"></div>
                </div>

                <div className="relative z-10 max-w-7xl mx-auto px-6 md:px-12 text-center animate-slideUp">
                    <h1 className="text-4xl md:text-7xl font-extrabold text-white tracking-tight mb-4 leading-tight">
                        Programa CREAS
                    </h1>
                    <h2 className="text-xl md:text-3xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-sky-300 mb-6 px-2">
                        Competencias Rectoras para el Encuentro y la Acción Social
                    </h2>
                    <p className="mt-4 text-lg md:text-2xl text-slate-300 max-w-3xl mx-auto leading-relaxed font-light mb-12 px-4">
                        Hacer vida la Doctrina Social de la Iglesia Católica.
                    </p>
                    <div className="flex flex-col sm:flex-row justify-center gap-4 px-4">
                        <a href="#etapas" className="w-full sm:w-auto bg-white text-slate-900 hover:bg-indigo-50 px-8 py-4 rounded-full font-bold text-lg transition-all flex items-center justify-center gap-3 shadow-xl hover:shadow-2xl hover:-translate-y-1">
                            Seleccionar Nivel <ArrowRight className="w-5 h-5 flex-shrink-0" />
                        </a>
                        <a href="#fundamentos" className="w-full sm:w-auto bg-slate-800/50 text-white border border-slate-700 hover:bg-slate-800 px-8 py-4 rounded-full font-bold text-lg transition-all flex items-center justify-center gap-3 backdrop-blur-sm hover:-translate-y-1">
                            Conocer el Programa
                        </a>
                    </div>
                </div>
            </div>
        );

        const Fundamentos = () => (
            <section id="fundamentos" className="py-20 md:py-24 bg-white relative">
                <div className="max-w-7xl mx-auto px-6 md:px-12">
                    <div className="text-center max-w-3xl mx-auto mb-16 md:mb-20 animate-slideUp">
                        <h2 className="text-sm font-black text-indigo-600 uppercase tracking-widest mb-3">El Motor Espiritual</h2>
                        <h3 className="text-3xl md:text-5xl font-extrabold text-slate-900 mb-6">Dilexit nos, Dilexi te y Magnifica Humanitas</h3>
                        <p className="text-base md:text-lg text-slate-600 leading-relaxed">
                            Ninguna reforma estructural, ningún proyecto de impacto social será verdadero ni sostenible si no brota de un corazón transformado por el amor de Cristo, consciente de su inmensa dignidad, y se orienta hacia el cuidado de los más necesitados. El programa persigue tres objetivos generales:
                        </p>
                    </div>

                    <div className="grid md:grid-cols-3 gap-8">
                        <div className="bg-slate-50 p-8 md:p-10 rounded-3xl border border-slate-100 hover:border-indigo-200 transition-colors shadow-sm hover:shadow-xl flex flex-col h-full">
                            <div className="w-14 h-14 md:w-16 md:h-16 bg-white shadow-sm rounded-2xl flex items-center justify-center mb-6 md:mb-8 flex-shrink-0">
                                <BookOpen className="w-7 h-7 md:w-8 md:h-8 text-indigo-600" />
                            </div>
                            <h4 className="text-xl md:text-2xl font-bold text-slate-900 mb-2">El Saber</h4>
                            <h5 className="text-xs md:text-sm font-bold text-indigo-600 uppercase tracking-wider mb-4">Dimensión Cognitiva</h5>
                            <p className="text-slate-600 leading-relaxed flex-grow text-sm md:text-base text-justify">
                                Conocer e interiorizar los valores fundamentales del Evangelio y la Doctrina Social de la Iglesia. Consiste en desarrollar un pensamiento crítico profundo que permita a los alumnos leer e interpretar su realidad local y global. Comprender el valor del bien común y la inalienable dignidad.
                            </p>
                        </div>
                        <div className="bg-slate-50 p-8 md:p-10 rounded-3xl border border-slate-100 hover:border-sky-200 transition-colors shadow-sm hover:shadow-xl flex flex-col h-full">
                            <div className="w-14 h-14 md:w-16 md:h-16 bg-white shadow-sm rounded-2xl flex items-center justify-center mb-6 md:mb-8 flex-shrink-0">
                                <Activity className="w-7 h-7 md:w-8 md:h-8 text-sky-600" />
                            </div>
                            <h4 className="text-xl md:text-2xl font-bold text-slate-900 mb-2">El Saber Hacer</h4>
                            <h5 className="text-xs md:text-sm font-bold text-sky-600 uppercase tracking-wider mb-4">Dimensión Procedimental</h5>
                            <p className="text-slate-600 leading-relaxed flex-grow text-sm md:text-base text-justify">
                                La capacidad operativa para aterrizar la teoría en soluciones tangibles. Significa colaborar en la mejora del entorno mediante el trabajo en equipo, ejerciendo una administración responsable de los recursos e involucrándose en proyectos que brinden apoyo real y organizado.
                            </p>
                        </div>
                        <div className="bg-slate-50 p-8 md:p-10 rounded-3xl border border-slate-100 hover:border-rose-200 transition-colors shadow-sm hover:shadow-xl flex flex-col h-full">
                            <div className="w-14 h-14 md:w-16 md:h-16 bg-white shadow-sm rounded-2xl flex items-center justify-center mb-6 md:mb-8 flex-shrink-0">
                                <Heart className="w-7 h-7 md:w-8 md:h-8 text-rose-500" />
                            </div>
                            <h4 className="text-xl md:text-2xl font-bold text-slate-900 mb-2">El Saber Ser</h4>
                            <h5 className="text-xs md:text-sm font-bold text-rose-500 uppercase tracking-wider mb-4">Dimensión Actitudinal</h5>
                            <p className="text-slate-600 leading-relaxed flex-grow text-sm md:text-base text-justify">
                                El dominio del corazón y la identidad de servicio. Busca forjar una identidad cristiana cimentada en la empatía, el respeto absoluto y la valentía cívica. Cultivar un corazón compasivo que rechace frontalmente la indiferencia y asuma una actitud permanente de cercanía y hospitalidad.
                            </p>
                        </div>
                    </div>
                </div>
            </section>
        );

        const Metodologia = () => (
            <section id="metodologia" className="py-20 md:py-24 bg-slate-900 text-white relative overflow-hidden">
                <div className="absolute inset-0 bg-[url('data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iNDAiIGhlaWdodD0iNDAiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+PGNpcmNsZSBjeD0iMjAiIGN5PSIyMCIgcj0iMSIgZmlsbD0icmdiYSgyNTUsMjU1LDI1NSwwLjA1KSIvPjwvc3ZnPg==')] opacity-30 pointer-events-none"></div>
                
                <div className="max-w-7xl mx-auto px-6 md:px-12 relative z-10">
                    <div className="text-center max-w-4xl mx-auto mb-16 md:mb-20">
                        <h2 className="text-sm font-black text-sky-400 uppercase tracking-widest mb-3">Arquitectura Pedagógica</h2>
                        <h3 className="text-3xl md:text-5xl font-extrabold mb-6 leading-tight">Formación en Espiral y Acción.</h3>
                        <p className="text-base md:text-lg text-slate-300 leading-relaxed">
                            La Doctrina Social de la Iglesia no se queda en un nivel conceptual. A través de la "Formación en Espiral", los 10 elementos de la DSI se visitan y revisitan cada año. Para hacerlos vida, el modelo <em>Learning by Doing</em> se divide en tres pilares de implementación fundamentales:
                        </p>
                    </div>

                    <div className="grid md:grid-cols-3 gap-8">
                        <div className="bg-slate-800/60 p-6 md:p-8 rounded-3xl border border-slate-700 backdrop-blur-md">
                            <div className="bg-indigo-500/20 w-14 h-14 md:w-16 md:h-16 rounded-2xl flex items-center justify-center mb-6 flex-shrink-0">
                                <FileText className="w-7 h-7 md:w-8 md:h-8 text-indigo-400" />
                            </div>
                            <h4 className="text-xl md:text-2xl font-bold mb-4 text-white">10 Sesiones Formativas</h4>
                            <p className="text-slate-300 text-sm md:text-base leading-relaxed text-justify">
                                El núcleo del programa. Cada ciclo escolar se estructura en 10 sesiones base. En ellas se combinan una <strong>"Charla de Formación"</strong> (para educar el intelecto y profundizar en los principios) con un <strong>"Taller de Acción Social"</strong> (el espacio práctico de incubación para diseñar y organizar los proyectos en equipo).
                            </p>
                        </div>
                        <div className="bg-slate-800/60 p-6 md:p-8 rounded-3xl border border-slate-700 backdrop-blur-md">
                            <div className="bg-emerald-500/20 w-14 h-14 md:w-16 md:h-16 rounded-2xl flex items-center justify-center mb-6 flex-shrink-0">
                                <MapIcon className="w-7 h-7 md:w-8 md:h-8 text-emerald-400" />
                            </div>
                            <h4 className="text-xl md:text-2xl font-bold mb-4 text-white">Experiencias Significativas</h4>
                            <p className="text-slate-300 text-sm md:text-base leading-relaxed text-justify">
                                El contacto directo rompe la burbuja de cristal. A lo largo del año, los alumnos realizan visitas e inmersiones seguras en realidades de vulnerabilidad extrema. El objetivo es que la realidad conmueva sus corazones, le pongan rostro al sufrimiento, y aprendan a consolar y acompañar con profunda empatía.
                            </p>
                        </div>
                        <div className="bg-slate-800/60 p-6 md:p-8 rounded-3xl border border-slate-700 backdrop-blur-md">
                            <div className="bg-amber-500/20 w-14 h-14 md:w-16 md:h-16 rounded-2xl flex items-center justify-center mb-6 flex-shrink-0">
                                <Lightbulb className="w-7 h-7 md:w-8 md:h-8 text-amber-400" />
                            </div>
                            <h4 className="text-xl md:text-2xl font-bold mb-4 text-white">Proyectos de Acción Social</h4>
                            <p className="text-slate-300 text-sm md:text-base leading-relaxed text-justify">
                                La indignación cívica se convierte en transformación. En cada grado, los estudiantes diseñan, fondean y ejecutan un proyecto de impacto real e integral. La exigencia crece gradualmente: desde pequeñas campañas ecológicas en Primaria, hasta incubar "Startups Sociales" auditables en Preparatoria.
                            </p>
                        </div>
                    </div>
                </div>
            </section>
        );

        const Materiales = () => (
            <section id="materiales" className="py-20 md:py-24 bg-slate-50 relative border-b border-slate-200">
                <div className="max-w-7xl mx-auto px-6 md:px-12">
                    <div className="text-center max-w-3xl mx-auto mb-12 md:mb-16">
                        <h2 className="text-sm font-black text-rose-600 uppercase tracking-widest mb-3">La Voz de la Iglesia</h2>
                        <h3 className="text-3xl md:text-5xl font-extrabold text-slate-900 mb-6">Materiales Fundamentales</h3>
                        <p className="text-base md:text-lg text-slate-600 leading-relaxed">
                            El Programa CREAS no es una currícula sociológica genérica, es la traducción viva del Magisterio de la Iglesia. Estos son los documentos base que inspiran y sostienen todo el modelo formativo.
                        </p>
                    </div>

                    <div className="bg-gradient-to-r from-indigo-600 to-blue-700 rounded-3xl p-6 md:p-10 shadow-xl mb-12 md:mb-16 flex flex-col md:flex-row items-center justify-between gap-6 text-white">
                        <div className="md:w-2/3 text-center md:text-left">
                            <h2 className="text-2xl md:text-3xl font-black mb-3 md:mb-4">Manual Institucional Base</h2>
                            <p className="text-indigo-100 text-sm md:text-base leading-relaxed mb-0">
                                Descarga el documento matriz que fundamenta todo el Programa CREAS. Incluye los propósitos, el modelo pedagógico y las métricas de implementación.
                            </p>
                        </div>
                        <div className="md:w-1/3 flex justify-center md:justify-end w-full mt-4 md:mt-0">
                            <a href="./Programa CREAS Institucional (2).pdf" target="_blank" className="w-full md:w-auto bg-white text-indigo-700 hover:bg-indigo-50 px-6 py-3.5 rounded-xl font-bold transition-all shadow-md flex items-center justify-center gap-2">
                                <Download className="w-5 h-5 flex-shrink-0" /> Descargar PDF
                            </a>
                        </div>
