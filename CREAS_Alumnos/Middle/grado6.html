                                                                    <h6 className="font-bold text-amber-900 mb-2 flex items-center gap-2"><MessageCircle className="w-5 h-5 text-amber-600" /> Caso: {sesionData.miniCaso.title}</h6>
                                                                    <p className="text-sm text-gray-800 mb-4 leading-relaxed">{sesionData.miniCaso.desc}</p>
                                                                    <div className="bg-amber-100/50 p-3 rounded-lg border border-amber-200/50">
                                                                        <p className="text-xs font-bold text-amber-900 mb-1 uppercase tracking-wider">Preguntas detonadoras:</p>
                                                                        <p className="text-sm text-amber-800 font-medium">{sesionData.miniCaso.preguntas}</p>
                                                                    </div>
                                                                </div>
                                                            )}
                                                            {sesionData.fundamentos && (
                                                                <div className="bg-blue-50 border border-blue-200 rounded-xl p-5 shadow-sm">
                                                                    <h6 className="font-bold text-blue-900 mb-3 flex items-center gap-2"><BookOpen className="w-5 h-5 text-blue-600" /> Fundamentos Doctrinales</h6>
                                                                    <ul className="space-y-3">
                                                                        {sesionData.fundamentos.map((fund, fIdx) => (
                                                                            <li key={fIdx} className="text-sm text-gray-800 leading-relaxed flex items-start gap-2">
                                                                                <span className="text-blue-500 mt-1">•</span>
                                                                                <span><strong className="text-blue-900">{fund.source}:</strong> {fund.text}</span>
                                                                            </li>
                                                                        ))}
                                                                    </ul>
                                                                </div>
                                                            )}
                                                        </div>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>

                    {/* Sessions and Sidebar Section */}
                    <div className="grid md:grid-cols-3 gap-8">
                        <div className="md:col-span-2 space-y-8">
                            <section>
                                <h2 className="text-2xl font-bold text-gray-900 mb-4 flex items-center gap-2"><FileText className="w-6 h-6 text-indigo-600"/> 10 Sesiones de Formación</h2>
                                <div className="bg-white border border-gray-200 rounded-xl overflow-hidden shadow-sm">
                                    <div className="p-4 bg-gray-50 border-b border-gray-200 flex justify-between items-center">
                                        <p className="text-sm text-gray-600"><strong>Rutina de aprendizaje:</strong> {activeData.rutina}</p>
                                        <p className="text-xs text-indigo-500 font-semibold animate-pulse">¡Haz clic en las sesiones para ver detalles!</p>
                                    </div>
                                    <ul className="divide-y divide-gray-100">
                                        {activeData.sesiones.map((sesionData, idx) => {
                                            const title = sesionData.sesion.split(': ')[1] || sesionData.sesion;
                                            const isExpanded = expandedSesion === idx;

                                            return (
                                                <li key={idx} className="transition-colors group">
                                                    <button 
                                                        onClick={() => setExpandedSesion(isExpanded ? null : idx)}
                                                        className="w-full text-left p-4 flex items-center justify-between cursor-pointer hover:bg-indigo-50"
                                                    >
                                                        <div className="flex items-start md:items-center gap-3">
                                                            <span className="flex-shrink-0 w-6 h-6 rounded-full bg-indigo-100 text-indigo-700 text-xs flex items-center justify-center font-bold mt-0.5 md:mt-0">{idx + 1}</span>
                                                            <span className={`font-medium text-sm md:text-base leading-snug transition-colors ${isExpanded ? 'text-indigo-700' : 'text-gray-700'}`}>
                                                                {title}
                                                            </span>
                                                        </div>
                                                        <ChevronRight className={`w-5 h-5 text-gray-400 transition-transform flex-shrink-0 ${isExpanded ? 'rotate-90 text-indigo-600' : 'group-hover:text-indigo-400'}`} />
                                                    </button>
                                                    
                                                    {isExpanded && (
                                                        <div className="px-4 pb-5 pt-1 md:pl-14 animate-fadeIn">
                                                            <div className="bg-indigo-50/60 rounded-xl p-5 border border-indigo-100 space-y-4 shadow-inner">
                                                                <p className="text-sm text-gray-700">
                                                                    <strong className="text-indigo-900">Objetivo:</strong> {sesionData.objetivo}
                                                                </p>
                                                                <p className="text-sm text-gray-700 leading-relaxed text-justify">
                                                                    <strong className="text-indigo-900">Resumen de la Charla:</strong> {sesionData.resumen}
                                                                </p>
                                                                {sesionData.preguntas && (
                                                                    <div className="bg-white p-4 rounded-lg border border-indigo-100 shadow-sm mt-4">
                                                                        <p className="font-bold text-indigo-900 mb-2 text-sm flex items-center gap-2">
                                                                            <MessageCircle className="w-4 h-4 text-indigo-500" />
                                                                            Preguntas de Reflexión
                                                                        </p>
                                                                        <ul className="list-none space-y-2">
                                                                            {sesionData.preguntas.map((q, i) => (
                                                                                <li key={i} className="text-sm text-indigo-800 flex items-start gap-2">
                                                                                    <span className="text-indigo-400 mt-0.5 font-bold">•</span>
                                                                                    <span>{q}</span>
                                                                                </li>
                                                                            ))}
                                                                        </ul>
                                                                    </div>
                                                                )}
                                                            </div>
                                                        </div>
                                                    )}
                                                </li>
                                            );
                                        })}
                                    </ul>
                                </div>
                            </section>
                        </div>

                        {/* Sidebar */}
                        <div className="space-y-6">
                            <section className="bg-emerald-50 rounded-xl p-6 border border-emerald-100 shadow-sm">
                                <h3 className="text-lg font-bold text-emerald-900 mb-4 flex items-center gap-2"><MapIcon className="w-5 h-5 text-emerald-600"/> Experiencias Significativas</h3>
                                <ul className="space-y-3">
                                    {gradeData.visitas.map((v, i) => (
                                        <li key={i} className="flex gap-2 text-sm text-emerald-800">
                                            <ChevronRight className="w-4 h-4 mt-0.5 text-emerald-500 flex-shrink-0"/> <span>{v}</span>
                                        </li>
                                    ))}
                                </ul>
                            </section>
                            <section className="bg-amber-50 rounded-xl p-6 border border-amber-100 shadow-sm">
                                <h3 className="text-lg font-bold text-amber-900 mb-4 flex items-center gap-2"><Lightbulb className="w-5 h-5 text-amber-600"/> Proyecto Acción Social</h3>
                                <ul className="space-y-3">
                                    {gradeData.proyectos.map((p, i) => (
                                        <li key={i} className="flex gap-2 text-sm text-amber-800">
                                            <CheckCircle className="w-4 h-4 mt-0.5 text-amber-500 flex-shrink-0"/> <span>{p}</span>
                                        </li>
                                    ))}
                                </ul>
                            </section>
                        </div>
                    </div>
                </div>
            );
        };

        function App() {
            return (
                <div className="min-h-screen flex flex-col">
                    <Navigation />
                    <main className="flex-grow"><ViewGrade /></main>
                    <footer className="bg-gray-900 text-gray-400 py-8 text-center text-sm border-t border-gray-800 mt-12">
                        <div className="max-w-7xl mx-auto px-4 flex flex-col md:flex-row justify-between items-center gap-4">
                            <p>© 2026 Programa CREAS.</p>
                            <p className="flex items-center gap-2"><Heart className="w-4 h-4 text-rose-500"/> Dilexit nos y Dilexi te</p>
                        </div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
