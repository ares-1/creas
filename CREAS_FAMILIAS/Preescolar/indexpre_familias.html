                                { titulo: "Comunicación mensual", desc: "Enviar tips prácticos de cómo integrar la ecología o el bien común en los juegos y tareas del K2-K3." },
                                { titulo: "Calendario amigable", desc: "Ajustar las sesiones a horarios realistas (ej. sabatinas con guardería) dada la edad de los hijos." },
                                { titulo: "Proyectos en familia", desc: "Asegurarse que los proyectos seleccionados permitan, en alguna medida, la participación visible de los niños pequeños." },
                            ].map((a, i) => (
                                <div key={i} className="flex gap-3">
                                    <div className="w-2 bg-amber-400 rounded-full flex-shrink-0" />
                                    <div>
                                        <h3 className="font-bold text-stone-900 mb-1">{a.titulo}</h3>
                                        <p className="text-stone-600 text-sm leading-relaxed">{a.desc}</p>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        };

        // ============================
        // VISTA RECURSOS
        // ============================
        const ViewRecursos = () => (
            <div className="max-w-5xl mx-auto py-12 px-4 animate-fadeIn">
                <h1 className="text-3xl font-extrabold text-stone-900 mb-8 border-b pb-4">Materiales de Apoyo</h1>

                <div className="mb-12">
                    <h2 className="text-2xl font-bold text-amber-900 mb-4 flex items-center gap-2">
                        <BookOpen className="w-6 h-6 text-amber-600" /> Las Tres Encíclicas del Programa
                    </h2>
                    <div className="grid md:grid-cols-3 gap-6 mb-6">
                        {[
                            { titulo: "Magnifica Humanitas", autor: "León XIV · 2026", color: "amber", url: "https://www.vatican.va/content/leo-xiv/es/encyclicals/documents/20260515-magnifica-humanitas.html", desc: "La encíclica social fundacional. En Preescolar nos recuerda que el hogar es el primer bien social y escuela de bondad." },
                            { titulo: "Dilexit Nos", autor: "Francisco · 2024", color: "rose", url: "https://www.vatican.va/content/francesco/es/encyclicals/documents/20241024-enciclica-dilexit-nos.html", desc: "Motor espiritual. Fundamenta el asombro y la capacidad del niño pequeño de sentir empatía por el que llora." },
                            { titulo: "Dilexit Te", autor: "León XIV · 2024", color: "orange", url: "https://www.vatican.va/content/leo-xiv/es/apost_exhortations/documents/20251004-dilexi-te.html", desc: "El amor conyugal como primer maestro de la DSI. El respeto entre esposos como cimiento de la dignidad." },
                        ].map((e, i) => {
                            const colors = {
                                amber: { hover: "hover:border-amber-300 group-hover:text-amber-700", icon: "text-amber-600", tag: "text-amber-600" },
                                rose: { hover: "hover:border-rose-300 group-hover:text-rose-700", icon: "text-rose-600", tag: "text-rose-600" },
                                orange: { hover: "hover:border-orange-300 group-hover:text-orange-700", icon: "text-orange-600", tag: "text-orange-600" },
                            };
                            const c = colors[e.color];
                            return (
                                <a key={i} href={e.url} target="_blank"
                                    className={`bg-white p-6 rounded-2xl border border-stone-200 shadow-sm ${c.hover} transition-all group flex flex-col`}>
                                    <div className="flex justify-between items-start mb-3">
                                        <BookOpen className={`w-8 h-8 ${c.icon} flex-shrink-0 group-hover:scale-110 transition-transform`} />
                                        <ExternalLink className="w-5 h-5 text-stone-400 group-hover:text-stone-600 flex-shrink-0" />
                                    </div>
                                    <p className={`text-xs font-bold uppercase tracking-wider mb-1 ${c.tag}`}>{e.autor}</p>
                                    <h4 className="font-bold text-lg text-stone-900 mb-2">{e.titulo}</h4>
                                    <p className="text-stone-600 text-xs md:text-sm flex-grow">{e.desc}</p>
                                </a>
                            );
                        })}
                    </div>

                    <div className="grid md:grid-cols-2 gap-6">
                        {[
                            { titulo: "Compendio de la DSI", url: "https://www.vatican.va/roman_curia/pontifical_councils/justpeace/documents/rc_pc_justpeace_doc_20060526_compendio-dott-soc_sp.html", desc: "Síntesis sistemática de los 10 elementos que recorren todo el programa. Consulta obligada para el conductor." },
                            { titulo: "Amoris Laetitia", url: "https://www.vatican.va/content/francesco/es/apost_exhortations/documents/papa-francesco_esortazione-ap_20160319_amoris-laetitia.html", desc: "Sobre el amor en la familia. Especialmente útil para la etapa de preescolar en temas de educación y hábitos." },
                            { titulo: "Laudato Si'", url: "https://www.vatican.va/content/francesco/es/encyclicals/documents/papa-francesco_20150524_enciclica-laudato-si.html", desc: "Fundamento de Ecología Integral. Clave para la sesión sobre ecología y asombro." },
                            { titulo: "Fratelli Tutti", url: "https://www.vatican.va/content/francesco/es/encyclicals/documents/papa-francesco_20201003_enciclica-fratelli-tutti.html", desc: "Amistad social. Base de la sesión 'La familia abierta' y las salidas del entorno habitual." },
                        ].map((d, i) => (
                            <a key={i} href={d.url} target="_blank"
                                className="bg-white p-5 rounded-xl border border-stone-200 shadow-sm hover:border-amber-400 transition-all group flex flex-col">
                                <div className="flex justify-between items-start mb-2">
                                    <h3 className="text-lg font-bold text-stone-900 group-hover:text-amber-700 transition-colors">{d.titulo}</h3>
                                    <ExternalLink className="w-4 h-4 text-stone-400 group-hover:text-amber-500 flex-shrink-0 mt-1" />
                                </div>
                                <p className="text-stone-600 text-sm leading-relaxed">{d.desc}</p>
                            </a>
                        ))}
                    </div>
                </div>

                <div className="bg-stone-900 text-white rounded-2xl p-8 shadow-xl">
                    <h3 className="text-2xl font-bold mb-2 text-white">Manuales Descargables</h3>
                    <p className="text-stone-300 mb-6 text-sm leading-relaxed">
                        Documentos de trabajo para conductores y directivos. Los manuales v2 integran las tres encíclicas: <em>Magnifica Humanitas</em>, <em>Dilexit Nos</em> y <em>Dilexit Te</em>.
                    </p>
                    <div className="grid sm:grid-cols-2 gap-4">
                        <a href="../Documento_Rector_CREAS_Familias.pdf" target="_blank"
                            className="flex items-center gap-3 bg-rose-600 hover:bg-rose-500 text-white px-5 py-3 rounded-xl font-bold transition-all shadow-md">
                            <Download className="w-5 h-5 flex-shrink-0" />
                            <div>
                                <p className="font-black text-sm">Documento Rector</p>
                                <p className="text-xs font-normal opacity-80">14 secciones · 3 encíclicas integradas</p>
                            </div>
                        </a>
                        <a href="../Preescolar_NotasTecnicas.pdf" target="_blank"
                            className="flex items-center gap-3 bg-amber-600 hover:bg-amber-500 text-white px-5 py-3 rounded-xl font-bold transition-all shadow-md">
                            <Download className="w-5 h-5 flex-shrink-0" />
                            <div>
                                <p className="font-black text-sm">Manual Directivo Preescolar</p>
                                <p className="text-xs font-normal opacity-80">Versión 2 · Enfoque primera infancia</p>
                            </div>
                        </a>
                    </div>
                </div>
            </div>
        );

        // ============================
        // APP
        // ============================
        function App() {
            const urlParams = new URLSearchParams(window.location.search);
            const initialView = urlParams.get('view') || 'home';
            const [currentView, setCurrentView] = useState(initialView);

            useEffect(() => {
                const handlePopState = () => {
                    const params = new URLSearchParams(window.location.search);
                    setCurrentView(params.get('view') || 'home');
                    window.scrollTo({ top: 0 });
                };
                window.addEventListener('popstate', handlePopState);
                return () => window.removeEventListener('popstate', handlePopState);
            }, []);

            const renderView = () => {
                switch (currentView) {
                    case 'home':         return <ViewHome setView={setCurrentView} />;
                    case 'fundamentos':  return <ViewFundamentos />;
                    case 'sesiones':     return <ViewSesiones />;
                    case 'directivos':   return <ViewDirectivos />;
                    case 'recursos':     return <ViewRecursos />;
                    default:             return <ViewHome setView={setCurrentView} />;
                }
            };

            return (
                <div className="min-h-screen flex flex-col">
                    <Navigation currentView={currentView} setCurrentView={setCurrentView} />
                    <main className="flex-grow">{renderView()}</main>
                    <footer className="bg-stone-950 text-stone-400 py-8 text-center text-sm border-t border-stone-900 mt-12">
                        <div className="max-w-7xl mx-auto px-4 flex flex-col md:flex-row justify-between items-center gap-4">
                            <p className="text-stone-300 font-bold">© 2026 CREAS Familias · Preescolar · </p>
                            <p className="flex items-center gap-2">
                                <Heart className="w-4 h-4 text-amber-500" />
                                <span>Magnifica Humanitas · Dilexit Nos · Dilexit Te</span>
                            </p>
                        </div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
