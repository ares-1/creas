<body class="bg-stone-50 text-slate-800 antialiased">

<div id="root"></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

/* ── ICONS ─────────────────────────────────────────────────────────────── */
const Ico = ({ d, className }) => (
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"
         className={className}>{d}</svg>
);
const Heart     = ({c}) => <Ico c={c} className={c} d={<path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>}/>;
const Users     = ({c}) => <Ico className={c} d={<><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></>}/>;
const BookOpen  = ({c}) => <Ico className={c} d={<><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></>}/>;
const Globe     = ({c}) => <Ico className={c} d={<><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></>}/>;
const ArrowR    = ({c}) => <Ico className={c} d={<><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></>}/>;
const Seed      = ({c}) => <Ico className={c} d={<><path d="M12 22V12"/><path d="M5 12C5 7 12 2 12 2s7 5 7 10a7 7 0 0 1-14 0z"/></>}/>;
const Network   = ({c}) => <Ico className={c} d={<><rect x="16" y="16" width="6" height="6" rx="1"/><rect x="2" y="16" width="6" height="6" rx="1"/><rect x="9" y="2" width="6" height="6" rx="1"/><path d="M5 16v-3a1 1 0 0 1 1-1h12a1 1 0 0 1 1 1v3"/><path d="M12 12V8"/></>}/>;
const Layers    = ({c}) => <Ico className={c} d={<><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></>}/>;
const Activity  = ({c}) => <Ico className={c} d={<polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>}/>;
const Monitor   = ({c}) => <Ico className={c} d={<><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></>}/>;
const MenuIco   = ({c}) => <Ico className={c} d={<><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></>}/>;
const Close     = ({c}) => <Ico className={c} d={<><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></>}/>;
const Star      = ({c}) => <Ico className={c} d={<polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>}/>;
const Check     = ({c}) => <Ico className={c} d={<><polyline points="20 6 9 17 4 12"/></>}/>;
const Cpu       = ({c}) => <Ico className={c} d={<><rect x="4" y="4" width="16" height="16" rx="2"/><rect x="9" y="9" width="6" height="6"/><line x1="9" y1="1" x2="9" y2="4"/><line x1="15" y1="1" x2="15" y2="4"/><line x1="9" y1="20" x2="9" y2="23"/><line x1="15" y1="20" x2="15" y2="23"/><line x1="20" y1="9" x2="23" y2="9"/><line x1="20" y1="14" x2="23" y2="14"/><line x1="1" y1="9" x2="4" y2="9"/><line x1="1" y1="14" x2="4" y2="14"/></>}/>;
const Compass   = ({c}) => <Ico className={c} d={<><circle cx="12" cy="12" r="10"/><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/></>}/>;

/* ── NAVBAR ────────────────────────────────────────────────────────────── */
const Navbar = () => {
    const [scrolled, setScrolled] = useState(false);
    const [open, setOpen] = useState(false);
    useEffect(() => {
        const h = () => setScrolled(window.scrollY > 50);
        window.addEventListener('scroll', h);
        return () => window.removeEventListener('scroll', h);
    }, []);
    const links = [
        { href: '#que-es', label: '¿Qué es CREAS?' },
        { href: '#fundamentos', label: 'Fundamentos' },
        { href: '#programas', label: 'Los Programas' },
        { href: '#dsi', label: 'DSI' },
    ];
    return (
        <nav className={`fixed w-full z-50 transition-all duration-300 ${scrolled || open ? 'bg-verde-800/97 backdrop-blur-md shadow-lg py-3' : 'bg-verde-800/80 backdrop-blur-sm py-5'}`}>
            <div className="max-w-7xl mx-auto px-6 md:px-12 flex justify-between items-center">
                <a href="#" className="flex items-center gap-3 hover:opacity-80 transition-opacity">
                    <Network c="w-7 h-7 text-dorado-500 flex-shrink-0" />
                    <span className="font-display text-xl text-white">
                        Ecosistema <span className="text-dorado-400 font-light">CREAS</span>
                    </span>
                </a>
                <div className="hidden lg:flex gap-7 items-center">
                    {links.map(l => (
                        <a key={l.href} href={l.href} className="text-sm font-semibold text-verde-200 hover:text-dorado-400 transition-colors">{l.label}</a>
                    ))}
                    <a href="#portales" className="bg-dorado-500 hover:bg-dorado-600 text-verde-900 px-6 py-2.5 rounded-full text-sm font-bold transition-all shadow-lg hover:scale-105">
                        Acceder a Portales
                    </a>
                </div>
                <button onClick={() => setOpen(!open)} className="lg:hidden p-2 text-white hover:text-dorado-400 transition-colors">
                    {open ? <Close c="w-7 h-7" /> : <MenuIco c="w-7 h-7" />}
                </button>
            </div>
            {open && (
                <div className="lg:hidden bg-verde-900 border-t border-verde-700 absolute top-full left-0 w-full shadow-2xl py-6 px-6 flex flex-col gap-5 animate-fadeIn">
                    {links.map(l => (
                        <a key={l.href} href={l.href} onClick={() => setOpen(false)}
                           className="text-left text-lg font-semibold text-verde-100 border-b border-verde-700 pb-3 hover:text-dorado-400 transition-colors">{l.label}</a>
                    ))}
                    <a href="#portales" onClick={() => setOpen(false)}
                       className="mt-2 bg-dorado-500 text-verde-900 px-6 py-4 rounded-xl text-center font-bold shadow-md">
                        Acceder a Portales
                    </a>
                </div>
            )}
        </nav>
    );
};

/* ── HERO ───────────────────────────────────────────────────────────────── */
const Hero = () => (

                <Network c="w-4 h-4 flex-shrink-0" /> Portal Institucional · 2026
            </div>
            <h1 className="font-display text-8xl md:text-[12rem] lg:text-[16rem] font-black text-white leading-none tracking-tighter mb-2 drop-shadow-2xl">
                CREAS
            </h1>
            <p className="text-dorado-400 text-lg md:text-2xl font-light tracking-widest uppercase mb-3">
                Competencias Rectoras para el Encuentro y la Acción Social
            </p>
            <p className="text-verde-200 text-base md:text-lg italic mb-10">
                Hacer vida la Doctrina Social de la Iglesia
            </p>
            <div className="inline-flex items-center gap-3 bg-verde-700/50 border border-verde-500/30 rounded-2xl px-6 py-3 mb-12">
                <span className="text-verde-200 text-sm italic">Dilexit nos</span>
                <span className="text-dorado-500">·</span>
                <span className="text-verde-200 text-sm italic">Dilexi te</span>
                <span className="text-dorado-500">·</span>
                <span className="text-verde-200 text-sm italic">Magnifica Humanitas</span>
            </div>
            <div className="flex flex-col sm:flex-row justify-center gap-4 px-4">
                <a href="#portales" className="w-full sm:w-auto bg-dorado-500 hover:bg-dorado-600 text-verde-900 px-8 py-4 rounded-full font-bold text-lg transition-all flex items-center justify-center gap-3 shadow-xl hover:-translate-y-1">
                    Acceder a los Portales <ArrowR c="w-5 h-5 flex-shrink-0" />
                </a>
                <a href="#que-es" className="w-full sm:w-auto bg-verde-700/60 border border-verde-400/40 text-white hover:bg-verde-700 px-8 py-4 rounded-full font-bold text-lg transition-all flex items-center justify-center gap-3 hover:-translate-y-1">
                    ¿Qué es CREAS?
                </a>
            </div>
        </div>
    </div>
);

/* ── QUÉ ES CREAS ───────────────────────────────────────────────────────── */
const QueEs = () => (
    <section id="que-es" className="py-20 md:py-28 bg-stone-50">
        <div className="max-w-7xl mx-auto px-6 md:px-12">
            <div className="text-center max-w-4xl mx-auto mb-16">
                <p className="text-xs font-black text-verde-600 uppercase tracking-widest mb-3">El ADN del Programa</p>
                <h2 className="font-display text-4xl md:text-5xl text-verde-800 mb-6">¿Qué significa CREAS?</h2>
                <p className="text-slate-600 text-base md:text-lg leading-relaxed">
                    CREAS es el acrónimo de <strong>Competencias Rectoras para el Encuentro y la Acción Social</strong>.
                    No es un programa aislado ni viene a sustituir lo que ya se hace en nuestros colegios.
                    Es una propuesta pedagógica que asegura mínimos comunes: que ningún alumno, padre o maestro
                    egrese de nuestra comunidad sin haber vivido la DSI de forma progresiva, significativa y sistemática.
                </p>
            </div>

            <div className="grid md:grid-cols-2 gap-6 mb-12">
                {[
                    { letra: 'C', color: 'text-verde-700', bg: 'bg-verde-50 border-verde-200', titulo: 'Competencias', icon: <Layers c="w-7 h-7 text-verde-600" />, texto: 'No se trata de acumular conocimiento teórico. Una competencia integra el Saber (mente), el Saber Hacer (manos) y el Saber Ser (corazón) para responder de forma activa y ética a los desafíos de la realidad.' },
                    { letra: 'R', color: 'text-dorado-600', bg: 'bg-amber-50 border-amber-200', titulo: 'Rectoras', icon: <Compass c="w-7 h-7 text-dorado-600" />, texto: 'Son rectoras porque gobiernan, dirigen y dan sentido. No son un proyecto secundario — son el eje que alinea y guía la labor de alumnos, familias y docentes hacia un mismo norte formativo.' },
                    { letra: 'E', color: 'text-verde-700', bg: 'bg-verde-50 border-verde-200', titulo: 'Encuentro', icon: <Users c="w-7 h-7 text-verde-600" />, texto: 'Inspirado en la Cultura del Encuentro de Fratelli Tutti. La valentía de salir de la propia burbuja social para mirar al otro especialmente al más vulnerable como a un hermano.' },
                    { letra: 'AS', color: 'text-dorado-600', bg: 'bg-amber-50 border-amber-200', titulo: 'Acción Social', icon: <Activity c="w-7 h-7 text-dorado-600" />, texto: 'Traducir la indignación y la compasión en obras tangibles. Pasar de las buenas intenciones a la transformación de las estructuras injustas mediante el compromiso organizado por el Bien Común.' },
                ].map(item => (
                    <div key={item.titulo} className={`bg-white border ${item.bg} rounded-3xl p-7 flex items-start gap-5 hover:shadow-md transition-all`}>
                        <div className={`${item.bg} p-3.5 rounded-2xl flex-shrink-0 border`}>{item.icon}</div>
                        <div>
                            <h3 className="text-xl font-bold text-slate-900 mb-2">
                                <span className={item.color}>{item.letra}</span>{item.titulo.slice(item.letra.length)}
                            </h3>
                            <p className="text-slate-600 text-sm leading-relaxed">{item.texto}</p>
                        </div>
                    </div>
                ))}
            </div>

            <div className="bg-verde-800 rounded-3xl p-8 md:p-12 text-white text-center shadow-2xl relative overflow-hidden">
                <div className="absolute inset-0 opacity-5 bg-[radial-gradient(circle_at_1px_1px,white_1px,transparent_0)] bg-[size:24px_24px]"></div>
                <div className="relative z-10">
                    <Seed c="w-10 h-10 text-dorado-400 mx-auto mb-5" />
                    <h3 className="font-display text-2xl md:text-3xl text-dorado-400 mb-4">Una semilla, no una solución total</h3>
                    <p className="text-verde-200 text-base md:text-lg leading-relaxed max-w-3xl mx-auto">
                        CREAS no es la respuesta a todo. Es una semilla bien plantada, sistemática y profunda,
                        que puede dar dirección, estructura y profundidad a lo que ya hacemos en nuestras instituciones.
                        No compite con ningún programa existente. Lo complementa y asegura que la DSI ocurra
                        de forma sistemática en toda la comunidad escolar.
                    </p>
                </div>
            </div>
        </div>
    </section>
);

/* ── FUNDAMENTOS ────────────────────────────────────────────────────────── */

            <div className="grid md:grid-cols-3 gap-6 mb-16">

                    { num: '01', titulo: 'Dilexit nos', autor: 'Francisco, 2024', icon: <Heart c="w-8 h-8 text-dorado-400" />, texto: 'El Corazón de Cristo como origen de toda acción social auténtica. Un corazón transformado por el amor de Dios actúa diferente: con paciencia, con atención al vulnerable, con sentido de misión que trasciende el cumplimiento de un programa.' },
                    { num: '02', titulo: 'Dilexi te', autor: 'León XIV, 2025', icon: <Users c="w-8 h-8 text-dorado-400" />, texto: 'El amor recibido de Cristo se convierte en amor activo hacia el prójimo vulnerable. La opción preferencial por los pobres es la verificación necesaria de que el amor a Dios ha transformado realmente nuestro corazón.' },
                    { num: '03', titulo: 'Magnifica Humanitas', autor: 'León XIV, 2026', icon: <Globe c="w-8 h-8 text-dorado-400" />, texto: 'Con motivo del 135° aniversario de la Rerum novarum. La DSI enfrenta los desafíos de la era digital y la IA. La persona humana no el algoritmo es el centro. La familia y los jóvenes como condiciones sociales de la esperanza.' },

                    <div className="grid grid-cols-2 gap-2">

                            '01 Dignidad de la Persona',
                            '02 El Bien Común',
                            '03 Destino Universal de los Bienes',
                            '04 Solidaridad',
                            '05 Subsidiaridad',
                            '06 Cultura del Encuentro',
                            '07 Ecología Integral',
                            '08 Dignidad del Trabajo',
                            '09 Participación Ciudadana',
                            '10 Opción por los Pobres',
                        ].map(el => (
                            <div key={el} className="bg-verde-800/60 rounded-xl px-3 py-2.5 flex items-center gap-2">
                                <span className="text-dorado-500 font-black text-xs">{el.slice(0,2)}</span>

        <div className="max-w-7xl mx-auto px-6 md:px-12">
            <div className="text-center max-w-3xl mx-auto mb-16">

                    { titulo: 'Learning by Doing', icon: <Activity c="w-7 h-7 text-verde-600" />, texto: 'La experiencia directa con la vulnerabilidad es irreemplazable. Cada etapa incluye proyectos sociales y experiencias significativas de encuentro real.' },
                ].map(p => (
                    <div key={p.titulo} className="bg-white border border-stone-200 rounded-3xl p-8 hover:shadow-md transition-all flex flex-col items-start">
