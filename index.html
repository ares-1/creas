<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ecosistema CREAS — Competencias Rectoras</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        .animate-fadeIn { animation: fadeIn 0.8s ease-out forwards; }
        .animate-slideUp { animation: slideUp 0.8s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        html { scroll-behavior: smooth; }
        body { overflow-x: hidden; }
        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f8fafc; }
        ::-webkit-scrollbar-thumb { background: #93c5fd; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #60a5fa; }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-800 antialiased selection:bg-indigo-200 selection:text-indigo-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- ÍCONOS SVG ---
        const Icon = ({ paths, className }) => (<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>{paths}</svg>);
        const Heart = ({className}) => <Icon className={className} paths={<path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>} />;
        const Shield = ({className}) => <Icon className={className} paths={<><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></>} />;
        const Compass = ({className}) => <Icon className={className} paths={<><circle cx="12" cy="12" r="10"/><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/></>} />;
        const ArrowRight = ({className}) => <Icon className={className} paths={<><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></>} />;
        const Activity = ({className}) => <Icon className={className} paths={<polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>} />;
        const BookOpen = ({className}) => <Icon className={className} paths={<><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></>} />;
        const Users = ({className}) => <Icon className={className} paths={<><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><polyline points="17 11 19 13 23 9"/></>} />;
        const MenuIcon = ({className}) => <Icon className={className} paths={<><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></>} />;
        const X = ({className}) => <Icon className={className} paths={<><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></>} />;
        const Globe = ({className}) => <Icon className={className} paths={<><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></>} />;
        const Network = ({className}) => <Icon className={className} paths={<><rect x="16" y="16" width="6" height="6" rx="1"/><rect x="2" y="16" width="6" height="6" rx="1"/><rect x="9" y="2" width="6" height="6" rx="1"/><path d="M5 16v-3a1 1 0 0 1 1-1h12a1 1 0 0 1 1 1v3"/><path d="M12 12V8"/></>} />;
        const Layers = ({className}) => <Icon className={className} paths={<><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></>} />;
        const Monitor = ({className}) => <Icon className={className} paths={<><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></>} />;

        // --- NAVBAR ---
        const Navbar = () => {
            const [scrolled, setScrolled] = useState(false);
            const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);

            useEffect(() => {
                const handleScroll = () => setScrolled(window.scrollY > 50);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            return (
                <nav className={`fixed w-full z-50 transition-all duration-300 ${scrolled || isMobileMenuOpen ? 'bg-white/95 backdrop-blur-md shadow-md py-3' : 'bg-white/80 backdrop-blur-sm py-5'}`}>
                    <div className="max-w-7xl mx-auto px-6 md:px-12 flex justify-between items-center">
                        <a href="#" className="flex items-center gap-3 group cursor-pointer transition-opacity hover:opacity-80">
                            <Network className={`w-8 h-8 flex-shrink-0 text-indigo-600 transition-colors`} />
                            <span className={`font-black text-xl tracking-tight text-slate-900 transition-colors`}>
                                Ecosistema <span className={`font-light text-indigo-600`}>CREAS</span>
                            </span>
                        </a>

                        <div className="hidden lg:flex gap-8 items-center">
                            <a href="#significado" className={`text-sm font-bold text-slate-600 hover:text-indigo-600 transition-colors`}>Significado</a>
                            <a href="#vision" className={`text-sm font-bold text-slate-600 hover:text-indigo-600 transition-colors`}>Estructura</a>
                            <a href="#fundamentos" className={`text-sm font-bold text-slate-600 hover:text-indigo-600 transition-colors`}>Fundamentos</a>
                            
                            <a href="#portales" className="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2.5 rounded-full text-sm font-bold transition-all shadow-lg shadow-indigo-200 hover:scale-105">Acceder a Portales</a>
                        </div>
                        <div className="lg:hidden flex items-center">
                            <button onClick={() => setIsMobileMenuOpen(!isMobileMenuOpen)} className={`p-2 rounded-lg cursor-pointer transition-colors flex-shrink-0 text-slate-900 hover:bg-slate-100`}>
                                {isMobileMenuOpen ? <X className="w-7 h-7 flex-shrink-0" /> : <MenuIcon className="w-7 h-7 flex-shrink-0" />}
                            </button>
                        </div>
                    </div>
                    {isMobileMenuOpen && (
                        <div className="lg:hidden bg-white border-t border-slate-100 absolute top-full left-0 w-full shadow-2xl py-6 px-6 flex flex-col gap-5 animate-fadeIn">
                            <a href="#significado" onClick={() => setIsMobileMenuOpen(false)} className="text-left text-lg font-bold text-slate-700 border-b border-slate-100 pb-3">Significado</a>
                            <a href="#vision" onClick={() => setIsMobileMenuOpen(false)} className="text-left text-lg font-bold text-slate-700 border-b border-slate-100 pb-3">Estructura</a>
                            <a href="#fundamentos" onClick={() => setIsMobileMenuOpen(false)} className="text-left text-lg font-bold text-slate-700 border-b border-slate-100 pb-3">Fundamentos</a>
                            <a href="#portales" onClick={() => setIsMobileMenuOpen(false)} className="mt-2 bg-indigo-600 text-white px-6 py-4 rounded-xl text-center font-bold shadow-md">Acceder a Portales</a>
                        </div>
                    )}
                </nav>
            );
        };

        // --- HERO ALEGRE Y LUMINOSO ---
        const Hero = () => (
            <div className="relative bg-white pt-32 pb-20 lg:pt-48 lg:pb-32 overflow-hidden">
                <div className="absolute top-0 left-0 w-full h-full overflow-hidden z-0 pointer-events-none">
                    <div className="absolute -top-[20%] -right-[10%] w-[60%] h-[60%] rounded-full bg-gradient-to-br from-sky-300/30 to-indigo-400/20 blur-3xl"></div>
                    <div className="absolute top-[50%] -left-[10%] w-[50%] h-[50%] rounded-full bg-gradient-to-tr from-rose-300/30 to-amber-300/20 blur-3xl"></div>
                    <div className="absolute inset-0 bg-[url('data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMjAiIGhlaWdodD0iMjAiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+PGNpcmNsZSBjeD0iMiIgY3k9IjIiIHI9IjEiIGZpbGw9InJnYmEoMjU1LDI1NSwyNTUsMC4wNSkiLz48L3N2Zz4=')] opacity-30"></div>
                </div>

                <div className="relative z-10 max-w-7xl mx-auto px-6 md:px-12 text-center animate-slideUp">
                    <div className="inline-flex items-center gap-2 bg-indigo-50 border border-indigo-100 text-indigo-700 px-5 py-2.5 rounded-full text-sm font-black mb-8 tracking-wider uppercase shadow-sm">
                        <Network className="w-4 h-4 flex-shrink-0" /> Portal Principal
                    </div>
                    
                    <h1 className="text-7xl md:text-9xl lg:text-[14rem] font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-sky-500 via-indigo-600 to-rose-500 tracking-tighter mb-4 leading-none drop-shadow-sm pb-2">
                        CREAS
                    </h1>
                    
                    <h2 className="text-xl md:text-3xl lg:text-4xl font-light text-slate-800 mb-10 px-2 uppercase tracking-widest flex flex-col gap-2 md:gap-4">
                        <span className="font-bold text-slate-900 tracking-widest drop-shadow-sm">Competencias Rectoras</span>
                        <span className="text-lg md:text-2xl lg:text-3xl text-slate-500 tracking-widest">para el Encuentro y la Acción Social</span>
                    </h2>
                    
                    <p className="mt-4 text-lg md:text-xl text-slate-600 max-w-4xl mx-auto leading-relaxed font-medium mb-12 px-4">
                        Una visión formativa integral <strong>para encarnar la Doctrina Social de la Iglesia Católica</strong>, que articula y une los esfuerzos del alumnado, las familias y el profesorado en una misma misión de transformación.
                    </p>
                    
                    <div className="flex flex-col sm:flex-row justify-center gap-4 px-4 mt-8">
                        <a href="#portales" className="w-full sm:w-auto bg-indigo-600 text-white hover:bg-indigo-700 px-8 py-4 rounded-full font-bold text-lg transition-all flex items-center justify-center gap-3 shadow-xl hover:shadow-2xl hover:-translate-y-1">
                            Acceder a los Portales <ArrowRight className="w-5 h-5 flex-shrink-0" />
                        </a>
                        <a href="#significado" className="w-full sm:w-auto bg-white text-indigo-700 border-2 border-indigo-100 hover:border-indigo-300 hover:bg-indigo-50 px-8 py-4 rounded-full font-bold text-lg transition-all flex items-center justify-center gap-3 shadow-sm hover:-translate-y-1">
                            ¿Qué significa CREAS?
                        </a>
                    </div>
                </div>
            </div>
        );

        // --- QUÉ SIGNIFICA CREAS Y CONEXIÓN DSI ---
        const SignificadoCreas = () => (
            <section id="significado" className="py-20 md:py-24 bg-slate-50 relative border-b border-slate-200">
                <div className="max-w-7xl mx-auto px-6 md:px-12">
                    <div className="text-center max-w-4xl mx-auto mb-16 animate-slideUp">
                        <h2 className="text-sm font-black text-indigo-500 uppercase tracking-widest mb-3">El ADN del Programa</h2>
                        <h3 className="text-3xl md:text-5xl font-extrabold text-slate-900 mb-6">¿Qué significa CREAS?</h3>
                        <p className="text-base md:text-lg text-slate-600 leading-relaxed text-justify md:text-center">
                            CREAS es el acrónimo de <strong>Competencias Rectoras para el Encuentro y la Acción Social</strong>. 
                            No es solo el nombre de un programa escolar; es una metodología profunda y práctica diseñada para encarnar el Evangelio en las aulas, los hogares y la sociedad.
                        </p>
                    </div>

                    <div className="grid md:grid-cols-2 gap-8 mb-16">
                        <div className="bg-white p-8 rounded-3xl border border-slate-100 shadow-sm flex items-start gap-5 hover:border-indigo-300 transition-colors">
                            <div className="bg-indigo-50 p-4 rounded-2xl flex-shrink-0">
                                <Layers className="w-8 h-8 text-indigo-600" />
                            </div>
                            <div>
                                <h4 className="text-xl md:text-2xl font-bold mb-2 text-slate-900"><span className="text-indigo-600">C</span>ompetencias</h4>
                                <p className="text-slate-600 text-sm md:text-base leading-relaxed">
                                    No se trata solo de acumular conocimiento teórico. Una competencia es la capacidad probada de movilizar la mente (Saber), las manos (Saber Hacer) y el corazón (Saber Ser) para responder de forma activa y ética a los desafíos de la realidad.
                                </p>
                            </div>
                        </div>
                        
                        <div className="bg-white p-8 rounded-3xl border border-slate-100 shadow-sm flex items-start gap-5 hover:border-amber-300 transition-colors">
                            <div className="bg-amber-50 p-4 rounded-2xl flex-shrink-0">
                                <Compass className="w-8 h-8 text-amber-600" />
                            </div>
                            <div>
                                <h4 className="text-xl md:text-2xl font-bold mb-2 text-slate-900"><span className="text-amber-500">R</span>ectoras</h4>
                                <p className="text-slate-600 text-sm md:text-base leading-relaxed">
                                    Son "rectoras" porque gobiernan, dirigen y dan sentido. No son una materia optativa o un proyecto secundario; son el eje central que alinea y guía la labor de estudiantes, familias y docentes hacia un mismo norte formativo.
                                </p>
                            </div>
                        </div>

                        <div className="bg-white p-8 rounded-3xl border border-slate-100 shadow-sm flex items-start gap-5 hover:border-rose-300 transition-colors">
                            <div className="bg-rose-50 p-4 rounded-2xl flex-shrink-0">
                                <Users className="w-8 h-8 text-rose-500" />
                            </div>
                            <div>
                                <h4 className="text-xl md:text-2xl font-bold mb-2 text-slate-900"><span className="text-rose-500">E</span>ncuentro</h4>
                                <p className="text-slate-600 text-sm md:text-base leading-relaxed">
                                    Inspirado en la <em>Cultura del Encuentro</em>. Es la valentía de salir de la indiferencia y de la propia burbuja social para mirar al otro —especialmente al más vulnerable— como a un hermano, construyendo puentes desde la dignidad.
                                </p>
                            </div>
                        </div>

                        <div className="bg-white p-8 rounded-3xl border border-slate-100 shadow-sm flex items-start gap-5 hover:border-sky-300 transition-colors">
                            <div className="bg-sky-50 p-4 rounded-2xl flex-shrink-0">
                                <Activity className="w-8 h-8 text-sky-500" />
                            </div>
                            <div>
                                <h4 className="text-xl md:text-2xl font-bold mb-2 text-slate-900"><span className="text-sky-500">A</span>cción <span className="text-sky-500">S</span>ocial</h4>
                                <p className="text-slate-600 text-sm md:text-base leading-relaxed">
                                    Consiste en traducir la indignación y la compasión en obras tangibles. Es pasar de las buenas intenciones a la transformación de las estructuras injustas mediante el trabajo organizado y el compromiso cívico por el Bien Común.
                                </p>
                            </div>
                        </div>
                    </div>

                    <div className="bg-gradient-to-r from-indigo-600 to-violet-700 rounded-3xl p-8 md:p-12 shadow-2xl text-center relative overflow-hidden text-white">
                        <div className="absolute top-0 left-0 w-full h-full opacity-10 bg-[url('data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iNDAiIGhlaWdodD0iNDAiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+PGNpcmNsZSBjeD0iMjAiIGN5PSIyMCIgcj0iMSIgZmlsbD0ibWFnaW50YSIvPjwvc3ZnPg==')]"></div>
                        <div className="relative z-10">
                            <BookOpen className="w-12 h-12 text-indigo-200 mx-auto mb-6" />
                            <h3 className="text-2xl md:text-4xl font-extrabold mb-6">La Conexión con la DSI</h3>
                            <p className="text-lg md:text-xl text-indigo-50 max-w-4xl mx-auto leading-relaxed font-light text-justify md:text-center">
                                <strong>CREAS es la traducción pedagógica de la Doctrina Social de la Iglesia Católica.</strong> <br/><br/>
                                Mientras que la Iglesia nos otorga el marco iluminador y los principios inquebrantables (como la Dignidad Trascendente, la Solidaridad y la Subsidiaridad), el programa <strong>CREAS</strong> proporciona la estructura didáctica para que esos principios no se queden en documentos de papel, sino que se conviertan en <em>competencias vivas</em>. Es el mecanismo práctico con el cual la comunidad educativa aprende, enseña y ejecuta la DSI en las realidades del siglo XXI.
                            </p>
                        </div>
                    </div>
                </div>
            </section>
        );

        // --- VISIÓN Y ALCANCE (ESTRUCTURA) ---
        const Vision = () => (
            <section id="vision" className="py-20 md:py-24 bg-white relative">
                <div className="max-w-7xl mx-auto px-6 md:px-12">
                    <div className="text-center max-w-4xl mx-auto mb-16 md:mb-20">
                        <h2 className="text-sm font-black text-sky-500 uppercase tracking-widest mb-3">Visión y Estructura</h2>
                        <h3 className="text-3xl md:text-5xl font-extrabold text-slate-900 mb-6">Un Solo Ecosistema de Transformación</h3>
                        <p className="text-base md:text-lg text-slate-600 leading-relaxed text-justify md:text-center">
                            Ninguna reforma estructural ni proyecto de impacto social será sostenible si no involucra a todos los actores de la comunidad educativa. 
                            El Programa CREAS no es una asignatura aislada; es un ecosistema que alinea al <strong>Alumnado</strong> (quienes lideran los proyectos), a las <strong>Familias</strong> (el primer santuario y escuela social), y a los <strong>Docentes</strong> (los testigos y guías en el aula) bajo una misma matriz formativa y un mismo lenguaje.
                        </p>
                    </div>

                    <div className="grid md:grid-cols-3 gap-8">
                        <div className="p-8 rounded-3xl bg-slate-50 border border-slate-100 flex flex-col items-center text-center hover:shadow-md transition-shadow">
                            <div className="w-16 h-16 bg-white rounded-2xl shadow-sm flex items-center justify-center mb-6">
                                <BookOpen className="w-8 h-8 text-indigo-500" />
                            </div>
                            <h4 className="text-xl font-bold text-slate-900 mb-3">El Saber</h4>
                            <p className="text-slate-600 text-sm leading-relaxed">
                                Formación doctrinal asíncrona y presencial. Conocer e interiorizar los 10 elementos fundamentales de la Doctrina Social de la Iglesia aplicados a la realidad.
                            </p>
                        </div>
                        <div className="p-8 rounded-3xl bg-slate-50 border border-slate-100 flex flex-col items-center text-center hover:shadow-md transition-shadow">
                            <div className="w-16 h-16 bg-white rounded-2xl shadow-sm flex items-center justify-center mb-6">
                                <Activity className="w-8 h-8 text-sky-500" />
                            </div>
                            <h4 className="text-xl font-bold text-slate-900 mb-3">El Saber Hacer</h4>
                            <p className="text-slate-600 text-sm leading-relaxed">
                                Del concepto a la acción social. Diseño, fondeo y ejecución de Proyectos Estructurales y participación directa en Experiencias Significativas en la periferia.
                            </p>
                        </div>
                        <div className="p-8 rounded-3xl bg-slate-50 border border-slate-100 flex flex-col items-center text-center hover:shadow-md transition-shadow">
                            <div className="w-16 h-16 bg-white rounded-2xl shadow-sm flex items-center justify-center mb-6">
                                <Heart className="w-8 h-8 text-rose-500" />
                            </div>
                            <h4 className="text-xl font-bold text-slate-900 mb-3">El Saber Ser</h4>
                            <p className="text-slate-600 text-sm leading-relaxed">
                                Transformación del corazón. Cultivar la empatía, el respeto absoluto y la valentía cívica, formando identidades cristianas que rechazan la indiferencia.
                            </p>
                        </div>
                    </div>
                </div>
            </section>
        );

        // --- FUNDAMENTOS MAGISTERIALES ---
        const Fundamentos = () => (
            <section id="fundamentos" className="py-20 md:py-24 bg-slate-100 relative border-y border-slate-200">
                <div className="max-w-7xl mx-auto px-6 md:px-12">
                    <div className="text-center max-w-3xl mx-auto mb-16">
                        <h2 className="text-sm font-black text-rose-500 uppercase tracking-widest mb-3">El Motor Espiritual</h2>
                        <h3 className="text-3xl md:text-5xl font-extrabold text-slate-900 mb-6">Las Tres Encíclicas Pilar</h3>
                        <p className="text-base md:text-lg text-slate-600 leading-relaxed">
                            Todo el Ecosistema CREAS está fundamentado, actualizado y motivado por la voz más reciente del Magisterio de la Iglesia.
                        </p>
                    </div>

                    <div className="grid md:grid-cols-3 gap-6">
                        <div className="bg-white p-8 rounded-3xl border border-slate-200 shadow-sm hover:shadow-lg transition-all flex flex-col justify-between">
                            <div>
                                <Heart className="w-10 h-10 text-rose-500 mb-6" />
                                <h4 className="text-2xl font-black text-slate-900 mb-2">Dilexit Nos</h4>
                                <h5 className="text-sm font-bold text-slate-400 uppercase tracking-widest mb-4">Francisco, 2024</h5>
                                <p className="text-slate-600 text-sm leading-relaxed mb-6">
                                    El corazón convertido como origen de la acción social. Enseña que quien ha sido amado por Cristo siente que el sufrimiento del otro no puede dejarle indiferente.
                                </p>
                            </div>
                        </div>

                        <div className="bg-white p-8 rounded-3xl border border-slate-200 shadow-sm hover:shadow-lg transition-all flex flex-col justify-between">
                            <div>
                                <Users className="w-10 h-10 text-amber-500 mb-6" />
                                <h4 className="text-2xl font-black text-slate-900 mb-2">Dilexit Te</h4>
                                <h5 className="text-sm font-bold text-slate-400 uppercase tracking-widest mb-4">León XIV, 2024</h5>
                                <p className="text-slate-600 text-sm leading-relaxed mb-6">
                                    El amor en el hogar como la primera fuerza social que irradia hacia la comunidad. Fundamenta profundamente el rol de las familias como primeros maestros de la DSI.
                                </p>
                            </div>
                        </div>

                        <div className="bg-white p-8 rounded-3xl border border-slate-200 shadow-sm hover:shadow-lg transition-all flex flex-col justify-between">
                            <div>
                                <Globe className="w-10 h-10 text-sky-500 mb-6" />
                                <h4 className="text-2xl font-black text-slate-900 mb-2">Magnifica Humanitas</h4>
