        // --- 10 ELEMENTOS DSI — enfoque Middle School Familias ---
        const DSI_ELEMENTS = [
            {
                short: "1. Dignidad Humana",
                title: "Dignidad Humana",
                desc: "Acompañar la identidad del adolescente frente a la presión social y la cultura digital. La dignidad humana en la era del 'like' y el descarte.",
                justificacion: "El adolescente de Middle School está construyendo quién es — y lo hace en gran parte a través de la mirada de sus padres. Los padres que participan en este elemento aprenden a reconocer y reforzar la dignidad incondicional de su hijo, independientemente de sus notas, su popularidad o su apariencia digital.",
                enciclica: "Dilexit Te",
                cita_enciclica: "El amor que los padres dan a sus hijos es el primer espejo donde el hijo aprende a verse como imagen de Dios. Sin ese amor incondicional, la dignidad del hijo queda desprotegida ante la cultura del descarte.",
                quotes: [
                    { source: "Dilexit Te — León XIV, 2024", text: "El amor conyugal que se derrama sobre los hijos es la primera y más elocuente afirmación de su dignidad. El hijo que sabe que es amado incondicionalmente crece libre." },
                    { source: "Magnifica Humanitas, Cap. III — León XIV, 2026", text: "La dignidad humana no es un logro: es un don. Los padres son los primeros guardianes de esa dignidad en sus hijos, especialmente en los años más vulnerables de la adolescencia." },
                    { source: "Dilexit Nos — Francisco, 2024", text: "El corazón de Cristo late por cada persona con un amor que no excluye ni descarta. Los padres que viven desde ese amor enseñan a sus hijos a mirar así al otro." },
                ]
            },
            {
                short: "2. El Bien Común",
                title: "El Bien Común",
                desc: "La ciudad y sus contrastes — formar conciencia urbana en el adolescente. El bien común no es solo cuidar el salón: es entender que la ciudad entera es responsabilidad de todos.",
                justificacion: "Los padres de Middle School tienden a sobreproteger a sus hijos de la realidad social difícil. Este elemento los invita a hacer lo contrario: exponerse ellos primero a los contrastes de su ciudad, para luego poder acompañar a sus hijos en ese encuentro sin miedo.",
                enciclica: "Magnifica Humanitas",
                cita_enciclica: "El bien común no se construye desde la comodidad. Los padres que se involucran activamente en su colonia y ciudad le dan al adolescente el testimonio más poderoso de que el mundo puede cambiar.",
                quotes: [
                    { source: "Magnifica Humanitas, n. 6 — León XIV, 2026", text: "¿Hacia dónde vamos? ¿Qué dirección elegir como comunidad humana? Estas preguntas decisivas ya no pueden eludirse — y los padres son los primeros llamados a responderlas con sus vidas." },
                    { source: "Gaudium et Spes, 26", text: "La interdependencia hace que el bien común abarque a toda la familia humana. Los padres que enseñan esto no enseñan política: enseñan caridad." },
                    { source: "Fratelli Tutti, 114", text: "La solidaridad se expresa concretamente en el servicio, que puede asumir formas muy diversas de hacerse cargo de los demás. Toca el rostro del hermano, siente su proximidad." },
                ]
            },
            {
                short: "3. Destino Universal de los Bienes",
                title: "Destino Universal de los Bienes",
                desc: "La hipoteca social de lo que tenemos — una reflexión honesta sobre el estilo de vida familiar. ¿Qué responsabilidad tiene quien más tiene ante la desigualdad que nos rodea?",
                justificacion: "Este es el elemento más desafiante del ciclo — y el más transformador cuando se vive con honestidad. Invita a los padres a mirar con serenidad y sin culpa su situación económica, y a preguntarse qué parte de sus decisiones de consumo tiene consecuencias sociales reales.",
                enciclica: "Magnifica Humanitas",
                cita_enciclica: "El adolescente de Middle School detecta la incoherencia entre lo que sus padres dicen y lo que consumen. La hipoteca social del estilo de vida familiar es la lección de DSI más poderosa que recibe — sin que se diga una sola palabra.",
                quotes: [
                    { source: "Populorum Progressio, 22", text: "La propiedad privada no constituye para nadie un derecho incondicional y absoluto. Nadie está autorizado a reservar para su uso exclusivo lo que supera a su necesidad." },
                    { source: "Magnifica Humanitas, n. 157 — León XIV, 2026", text: "La acumulación de riqueza sin responsabilidad social no es solo un error económico: es una contradicción evangélica que los padres están llamados a resolver en su propia vida." },
                    { source: "Fratelli Tutti, 119", text: "El derecho a la propiedad privada sólo puede ser considerado como un derecho secundario y derivado del principio del destino universal de los bienes creados." },
                ]
            },
            {
                short: "4. Solidaridad",
                title: "Solidaridad",
                desc: "Redes de apoyo y voluntariado — cómo el padre modela la solidaridad organizada. La diferencia entre la caridad individual y la solidaridad estructural que transforma causas.",

                enciclica: "Dilexit Nos",
                cita_enciclica: "La solidaridad estructural pierde su alma si no nace de un corazón tocado por el amor de Cristo. El adolescente de Middle School percibe si el compromiso social de sus padres es auténtico — y es esa autenticidad la que forma.",
                quotes: [
                    { source: "Dilexit Nos — Francisco, 2024", text: "Quien ha sido amado por el Corazón de Cristo siente que el sufrimiento del otro no puede dejarle indiferente. La solidaridad no es una opción: es la consecuencia natural del amor recibido." },
                    { source: "Sollicitudo Rei Socialis, 38", text: "La solidaridad es la determinación firme y perseverante de empeñarse por el bien común; es decir, por el bien de todos y cada uno, para que todos seamos verdaderamente responsables de todos." },
                    { source: "Compendio de la DSI, 193", text: "La solidaridad se eleva al rango de virtud social fundamental. Debe traducirse en la voluntad de entregarse por el bien del prójimo, como persona y como nación." },
                ]
            },
            {
                short: "5. Subsidiaridad",
                title: "Subsidiaridad",
                desc: "La familia como base social — el padre que fortalece sin absorber la iniciativa del adolescente. Cómo acompañar el liderazgo emergente del hijo sin sobreprotegerlo ni abandonarlo.",
                justificacion: "Middle School es la etapa en que el hijo empieza a tener sus propias opiniones, proyectos e iniciativas sociales. Este elemento invita a los padres a aprender a dar pasos atrás: a sostener sin controlar, a acompañar sin reemplazar.",
                enciclica: "Dilexit Te",
                cita_enciclica: "El amor maduro sabe cuándo dar un paso atrás. Los padres que practican la subsidiaridad con sus hijos adolescentes les dan el regalo más valioso: la confianza de que son capaces de liderar.",
                quotes: [
                    { source: "Dilexit Te — León XIV, 2024", text: "El amor conyugal que sabe dejar crecer al hijo sin retenerlo es uno de los gestos más elevados de amor. Los padres que hacen esto forman hijos libres." },

                    { source: "Catecismo de la Iglesia Católica, 1883", text: "El Estado — y los padres — no deben intervenir íntimamente en lo que las comunidades menores pueden realizar por sí solas, sino sostenerlas y ayudarlas." },
                ]
            },
            {
                short: "6. Cultura del Encuentro",
                title: "Cultura del Encuentro",
                desc: "El diálogo con el diferente — cómo el padre modela la apertura y el respeto en la adolescencia. El adolescente aprende a relacionarse con quien es diferente principalmente de lo que ve en sus padres.",
                justificacion: "Los padres de familias acomodadas tienden a relacionarse en entornos muy homogéneos. Este elemento los invita a ampliar deliberadamente sus redes de contacto — no para hacer turismo social, sino para vivir la fraternidad real que luego sus hijos adolescentes podrán aprender.",
                enciclica: "Dilexit Nos",
                cita_enciclica: "El encuentro con el diferente no es un ejercicio de tolerancia: es un encuentro con el Corazón de Cristo presente en cada persona. Los padres que viven esto forman adolescentes hospitalarios y libres de prejuicios.",
                quotes: [
                    { source: "Fratelli Tutti, 215", text: "La vida es el arte del encuentro, aunque haya tanto desencuentro. Nos apasiona el buscar puntos de contacto, el tender puentes, el planear algo que incluya a todos." },
                    { source: "Dilexit Nos — Francisco, 2024", text: "El Corazón de Cristo no tiene fronteras. Quien vive desde ese corazón no puede encerrarse en un mundo homogéneo ni enseñar a sus hijos a temer al diferente." },
                    { source: "Evangelii Gaudium, 220", text: "La cultura del encuentro exige que estemos dispuestos no sólo a dar, sino a recibir de los otros. Genera una verdadera solidaridad que no es paternalismo." },
                ]
            },
            {
                short: "7. Ecología Integral",
                title: "Ecología Integral",
                desc: "Estilo de vida y huella ecológica — una revisión honesta del consumo familiar. El adolescente de hoy es especialmente sensible a la coherencia ecológica de sus padres.",
                justificacion: "Los jóvenes de Middle School son la generación más consciente del cambio climático. Este elemento trabaja la coherencia entre lo que los padres dicen sobre el medio ambiente y cómo viven realmente: sus decisiones de consumo, transporte, alimentación y residuos.",
                enciclica: "Magnifica Humanitas",
                cita_enciclica: "La ecología integral conecta el cuidado de la tierra con la opción por los pobres: son los más vulnerables quienes más sufren el deterioro ambiental. Los padres que viven esto forman hijos con una sensibilidad social y ecológica integrada.",
                quotes: [
                    { source: "Laudato Si', 139", text: "No hay dos crisis separadas, una ambiental y otra social, sino una sola y compleja crisis socio-ambiental. La solución requiere una aproximación integral para combatir la pobreza." },
                    { source: "Magnifica Humanitas — León XIV, 2026", text: "La sobriedad del estilo de vida familiar no es una carga: es una forma de amor hacia las generaciones futuras y hacia los más pobres del presente." },
                    { source: "Laudate Deum, 2", text: "A los más pobres les toca sufrir las peores consecuencias del cambio climático, aunque sean los que menos han contribuido a generarlo. Esto es una injusticia que los padres deben nombrar." },
                ]
            },
            {
                short: "8. Dignidad del Trabajo",
                title: "Dignidad del Trabajo",
                desc: "Vocación inicial — acompañar al adolescente a descubrir sus talentos con sentido de servicio. ¿Cómo habla el padre de su trabajo y de la elección de carrera de su hijo?",
                justificacion: "El adolescente de Middle School empieza a preguntarse qué quiere ser. Los padres que hablan de su trabajo como servicio — y no solo como fuente de ingresos o estatus — le dan una orientación vocacional que ninguna orientadora profesional puede reemplazar.",
                enciclica: "Magnifica Humanitas",
                cita_enciclica: "El adolescente que ve a sus padres vivir su trabajo como un don y un servicio tiene una ventaja enorme al momento de elegir su vocación. Magnifica Humanitas recuerda que el trabajo es participación en la obra creadora de Dios.",
                quotes: [
                    { source: "Magnifica Humanitas, n. 150 — León XIV, 2026", text: "El trabajo humano, cuando se vive con espíritu de servicio, es una de las formas más altas de amor al prójimo y de participación en la construcción del bien común." },
                    { source: "Laborem Exercens, 6", text: "El primer fundamento del valor del trabajo es el hombre mismo, su sujeto. El trabajo está en función del hombre y no el hombre en función del trabajo." },
                    { source: "Dilexit Te — León XIV, 2024", text: "Los padres que viven su trabajo como vocación de servicio — y no como carrera de estatus — forman hijos capaces de elegir con libertad y con criterios de bien común." },
                ]
            },
            {
                short: "9. Participación Ciudadana",

                desc: "Democracia, derechos y deberes — el padre que forma hijos con voz y criterio ciudadano. Voto consciente, participación en la vida pública y el testimonio de civismo activo.",
                justificacion: "Este elemento interpela directamente el modo de vida de los padres: ¿participan en la junta de vecinos? ¿Votan con criterios de bien común? ¿Se involucran en causas de la colonia? El adolescente de Middle School está formando su identidad ciudadana — y lo hace principalmente imitando a sus padres.",
                enciclica: "Magnifica Humanitas",
                cita_enciclica: "Magnifica Humanitas recuerda que la participación ciudadana no es una opción para el cristiano: es una forma de caridad. Los padres que ejercen un civismo activo forman hijos con voz y criterio.",
                quotes: [
                    { source: "Magnifica Humanitas, n. 134 — León XIV, 2026", text: "La participación activa en la vida pública es una exigencia de la caridad cristiana. El padre que participa en su comunidad le enseña a su hijo que la sociedad puede mejorarse." },
                    { source: "Catecismo de la Iglesia Católica, 1913", text: "La participación es el compromiso voluntario y generoso de la persona en los intercambios sociales. Todos deben participar, cada uno según el lugar que ocupa." },
                    { source: "Fratelli Tutti, 180", text: "La política es más noble que la apariencia. Necesitamos una política que piense con visión amplia, que no deje a nadie afuera y que se oriente al bien de todos." },
                ]
            },
            {
                short: "10. Opción Preferencial por los Pobres",
                title: "Opción Preferencial por los Pobres",
                desc: "El rostro de Cristo en el pobre — cómo el padre acompaña al adolescente al encuentro con la vulnerabilidad. La Opción por los Pobres como criterio de autenticidad de la fe familiar.",
                justificacion: "Este es el corazón del programa. Dilexit Nos precisa que el encuentro con el pobre es un encuentro con el Corazón de Cristo. Para el adolescente de Middle School, ver a sus padres acompañar al vulnerable desde la fe — no desde la lástima ni desde el voluntarismo — es la lección de cristianismo más poderosa que recibirán en estos años.",
                enciclica: "Dilexit Nos",
                cita_enciclica: "El encuentro con el pobre es un encuentro con el Corazón de Cristo. Para el adolescente de Middle School, ver a sus padres acompañar al vulnerable desde la fe — no desde la lástima — es la lección de cristianismo más poderosa que recibirá en estos años.",
                quotes: [
                    { source: "Dilexit Nos — Francisco, 2024", text: "El rostro de Cristo en el pobre no es una metáfora: es teología concreta. Quien ha sido tocado por el amor del Corazón de Jesús no puede pasar de largo ante el sufrimiento ajeno." },
                    { source: "Evangelii Gaudium, 198", text: "Para la Iglesia, la opción por los pobres es una categoría teológica antes que cultural, sociológica, política o filosófica. Dios les otorga su primera misericordia." },
                    { source: "Magnifica Humanitas, n. 174 — León XIV, 2026", text: "La opción por los pobres no es ideología: es consecuencia del encuentro con Cristo. Los padres que viven esto con autenticidad forman hijos capaces de transformar las estructuras." },
                ]
            }
        ];

        // APP

        function App() {
            const urlParams = new URLSearchParams(window.location.search);
            const initialView = urlParams.get('view') || 'home';
            const [currentView, setCurrentView] = useState(initialView);

            useEffect(() => {
                const handlePopState = () => {
                    const params = new URLSearchParams(window.location.search);
                    setCurrentView(params.get('view') || 'home');
                    window.scrollTo({ top: 0 });
                };
                window.addEventListener('popstate', handlePopState);
                return () => window.removeEventListener('popstate', handlePopState);
            }, []);

            const renderView = () => {
                switch (currentView) {
                    case 'home':         return <ViewHome setView={setCurrentView} />;
                    case 'fundamentos':  return <ViewFundamentos />;
                    case 'sesiones':     return <ViewSesiones />;
                    case 'directivos':   return <ViewDirectivos />;
                    case 'recursos':     return <ViewRecursos />;
                    default:             return <ViewHome setView={setCurrentView} />;
                }
            };

            return (
                <div className="min-h-screen flex flex-col">
                    <Navigation currentView={currentView} setCurrentView={setCurrentView} />
                    <main className="flex-grow">{renderView()}</main>
                    <footer className="bg-stone-950 text-stone-400 py-8 text-center text-sm border-t border-stone-900 mt-12">
                        <div className="max-w-7xl mx-auto px-4 flex flex-col md:flex-row justify-between items-center gap-4">
