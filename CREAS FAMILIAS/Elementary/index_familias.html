                    <div className="grid md:grid-cols-3 gap-6 mb-6">
                        {[
                            { titulo: "Magnifica Humanitas", autor: "León XIV · 2026", color: "amber", url: "https://www.vatican.va/content/leo-xiv/es/encyclicals/documents/20260515-magnifica-humanitas.html", desc: "La encíclica social fundacional. En Elementary impulsa la austeridad en el consumo, el valor del esfuerzo y la enseñanza del bien común." },
                            { titulo: "Dilexit Nos", autor: "Francisco · 2024", color: "rose", url: "https://www.vatican.va/content/francesco/es/encyclicals/documents/20241024-enciclica-dilexit-nos.html", desc: "Motor espiritual. Fundamenta el salto de la donación de objetos (ropa usada) a la entrega de la propia persona (tiempo/servicio)." },
                            { titulo: "Dilexit Te", autor: "León XIV · 2024", color: "orange", url: "https://www.vatican.va/content/leo-xiv/es/apost_exhortations/documents/20251004-dilexi-te.html", desc: "El amor conyugal que promueve autonomía. Base para combatir la sobreprotección y fomentar la subsidiaridad en lo académico." },
                        ].map((e, i) => {
                            const colors = {
                                amber: { hover: "hover:border-amber-300 group-hover:text-amber-700", icon: "text-amber-600", tag: "text-amber-600" },

                    <div className="grid md:grid-cols-2 gap-6">
                        {[

                    </p>
                    <div className="grid sm:grid-cols-2 gap-4">
                        <a href="../Documento_Rector_CREAS_Familias.pdf" target="_blank"

                            <div>
                                <p className="font-black text-sm">Manual Directivo Elementary</p>

        // ============================
        // APP
        // ============================
        function App() {
            const urlParams = new URLSearchParams(window.location.search);
            const initialView = urlParams.get('view') || 'home';
            const [currentView, setCurrentView] = useState(initialView);

            useEffect(() => {
                const handlePopState = () => {
                    const params = new URLSearchParams(window.location.search);
                    setCurrentView(params.get('view') || 'home');
                    window.scrollTo({ top: 0 });
                };
                window.addEventListener('popstate', handlePopState);
                return () => window.removeEventListener('popstate', handlePopState);
            }, []);

            const renderView = () => {
                switch (currentView) {
                    case 'home':         return <ViewHome setView={setCurrentView} />;
                    case 'fundamentos':  return <ViewFundamentos />;
                    case 'sesiones':     return <ViewSesiones />;
                    case 'directivos':   return <ViewDirectivos />;
                    case 'recursos':     return <ViewRecursos />;
                    default:             return <ViewHome setView={setCurrentView} />;
                }
            };

            return (
                <div className="min-h-screen flex flex-col">
                    <Navigation currentView={currentView} setCurrentView={setCurrentView} />
                    <main className="flex-grow">{renderView()}</main>
                    <footer className="bg-stone-950 text-stone-400 py-8 text-center text-sm border-t border-stone-900 mt-12">
                        <div className="max-w-7xl mx-auto px-4 flex flex-col md:flex-row justify-between items-center gap-4">
                            <p className="text-stone-300 font-bold">© 2026 CREAS Familias · Elementary · </p>
                            <p className="flex items-center gap-2">
                                <Heart className="w-4 h-4 text-orange-500" />
                                <span>Magnifica Humanitas · Dilexit Nos · Dilexit Te</span>
                            </p>
                        </div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
