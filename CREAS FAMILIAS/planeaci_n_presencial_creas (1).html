        const ThemeCard = ({ tema, colorStr }) => {

            // Mapear colorStr a clases Tailwind
            const colorMap = {
                'amber': { bg: 'bg-amber-50', text: 'text-amber-700', border: 'border-amber-200', btn: 'bg-amber-100 text-amber-800' },
                'orange': { bg: 'bg-orange-50', text: 'text-orange-700', border: 'border-orange-200', btn: 'bg-orange-100 text-orange-800' },
                'rose': { bg: 'bg-rose-50', text: 'text-rose-700', border: 'border-rose-200', btn: 'bg-rose-100 text-rose-800' },
                'stone': { bg: 'bg-stone-100', text: 'text-stone-800', border: 'border-stone-300', btn: 'bg-stone-200 text-stone-800' },
